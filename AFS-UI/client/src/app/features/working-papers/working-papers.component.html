<h2 mat-dialog-title>New Working Paper</h2>
<mat-dialog-content>
  <div class="form-grid">
    <mat-form-field appearance="outline">
      <mat-label>Title</mat-label>
      <input matInput [(ngModel)]="data.title" required>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Section</mat-label>
      <input matInput [(ngModel)]="data.section">
    </mat-form-field>
    <mat-form-field appearance="outline" style="grid-column: 1 / -1">
      <mat-label>Description</mat-label>
      <textarea matInput [(ngModel)]="data.description" rows="3"></textarea>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Compilation</mat-label>
      <mat-select [(ngModel)]="data.compilationId">
        @for (c of compilations(); track c.id) {
          <mat-option [value]="c.id">{{ c.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button class="btn-primary" [disabled]="!data.title" (click)="save()">Create</button>
</mat-dialog-actions>
