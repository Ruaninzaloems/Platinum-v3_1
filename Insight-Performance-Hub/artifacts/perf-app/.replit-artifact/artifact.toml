kind = "web"
previewPath = "/"
title = "Performance Management"
version = "1.0.0"
id = "artifacts/perf-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18156
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/perf-app run dev"

[services.env]
PORT = "18156"
BASE_PATH = "/perf-app/"

[services.production]
build = ["pnpm", "--filter", "@workspace/perf-app", "run", "build"]
publicDir = "artifacts/perf-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
