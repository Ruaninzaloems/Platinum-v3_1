    post:
      operationId: createRevisionLogs
      tags: [scorecards]
      summary: Create revision audit log entries
      parameters:
        - name: scorecardId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entries]
              properties:
                entries:
                  type: array
                  items:
                    type: object
                    required: [revisionType]
