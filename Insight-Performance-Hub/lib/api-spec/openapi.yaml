openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Organisational Performance Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and user management
  - name: cycles
    description: Performance cycle management
  - name: kpiGroups
    description: KPI group configuration
  - name: unitsOfMeasure
    description: Units of measure configuration
  - name: dataTypes
    description: KPI data type configuration
  - name: progressStatuses
    description: KPI progress status configuration
  - name: scorecardTypes
    description: Scorecard type configuration
  - name: nkpaWeightings
    description: NKPA weighting configuration
  - name: submissionDeadlines
    description: Submission deadline configuration
  - name: reportFields
    description: Custom report field configuration
  - name: competencyRequirements
    description: Core competency requirement configuration
  - name: auditLogs
    description: Audit trail
  - name: notifications
    description: Notification configuration and centre
  - name: scorecards
    description: Organisational scorecard management
  - name: scorecardKpis
    description: Scorecard KPI planning
  - name: quarterTargets
    description: KPI quarterly target capture
  - name: monthActivities
    description: Monthly activity planning
  - name: sdbip
    description: SDBIP management
  - name: actuals
    description: Quarterly actual capture
  - name: evidence
    description: Evidence document management
  - name: correctiveActions
    description: Corrective and remedial action plans
  - name: deptScorecards
    description: Departmental scorecard management
  - name: reviews
    description: Review workflow
  - name: moderation
    description: Moderation and validation
  - name: periodLocks
    description: Period lock and unlock
  - name: dashboards
    description: Executive, departmental and overview dashboards
  - name: reports
    description: Report generation and retrieval

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/users:
    get:
      operationId: listUsers
      tags: [auth]
      summary: List all users
      responses:
        "200":
          description: User list
          content:
