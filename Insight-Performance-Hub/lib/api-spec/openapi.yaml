components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        role:
          type: string
        departmentId:
          type: integer
          nullable: true
        isActive:
          type: boolean
      required:
        - id
        - username
        - displayName
        - email
        - role
        - isActive

    Role:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - code
        - description
        - permissions

    PerformanceCycle:
      type: object
      properties:
        id:
          type: integer
        financialYearLabel:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [Draft, Open, Closed, Archived]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - financialYearLabel
        - startDate
        - endDate
        - status
        - createdAt
        - updatedAt

    CreateCycleInput:
      type: object
      properties:
        financialYearLabel:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
