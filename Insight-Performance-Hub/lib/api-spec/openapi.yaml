    get:
      operationId: getCycle
      tags: [cycles]
      summary: Get a single cycle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cycle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceCycle"
    patch:
      operationId: updateCycle
      tags: [cycles]
      summary: Update a cycle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCycleInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceCycle"
    delete:
      operationId: deleteCycle
      tags: [cycles]
      summary: Delete a draft cycle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

