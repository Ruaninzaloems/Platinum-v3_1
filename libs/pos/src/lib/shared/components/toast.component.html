<div class="toast-container">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast" [class]="'toast-' + toast.type" (click)="toastService.dismiss(toast.id)" data-testid="toast-message" style="white-space: pre-line; max-width: 480px;">
      {{ toast.message }}
    </div>
  }
</div>
