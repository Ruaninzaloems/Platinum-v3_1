<div class="stat-card" [class]="'stat-card variant-' + variant + (link ? ' stat-clickable' : '')" (click)="handleClick()" [style.cursor]="link ? 'pointer' : 'default'" data-testid="stat-card">
  @if (icon) {
    <div class="stat-icon-container">
      <span class="material-icons stat-icon">{{ icon }}</span>
    </div>
  }
  <div class="stat-content">
    <span class="stat-label" data-testid="text-stat-label">{{ label }}</span>
    <span class="stat-value" data-testid="text-stat-value">{{ value }}</span>
    @if (trend) {
      <span class="stat-trend" [class]="'stat-trend trend-' + trendDirection" data-testid="text-stat-trend">
        {{ trend }}
      </span>
    }
  </div>
</div>
